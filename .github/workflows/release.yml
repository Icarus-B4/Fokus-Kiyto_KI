name: Build Signed APK

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  test:
    name: Unit Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: 17
          cache: "gradle"

      - name: Grant execute permissions for gradlew
        run: chmod +x gradlew

      - name: Run unit tests
        run: ./gradlew clean testDebug

  build:
    name: Build Signed APK
    needs: test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: 17
          cache: "gradle"

      - name: Decode Keystore
        env:
          ENCODED_KEYSTORE: ${{ secrets.ANDROID_KEYSTORE }}
        run: |
          if [ -z "$ENCODED_KEYSTORE" ]; then
            echo "Error: ANDROID_KEYSTORE secret is empty."
            exit 1
          fi
          mkdir -p app/keystore
          printf "%s" "$ENCODED_KEYSTORE" | base64 --decode > app/keystore/kiyto_release.keystore
          
          # Validation: Check if the file was created and has a reasonable size (>1KB)
          FILESIZE=$(stat -c%s "app/keystore/kiyto_release.keystore")
          echo "Keystore file size: $FILESIZE bytes"
          if [ "$FILESIZE" -lt 1000 ]; then
            echo "Error: Keystore file is too small ($FILESIZE bytes). Secret might be truncated."
            exit 1
          fi

      - name: Verify Keystore
        run: |
          keytool -list -v -keystore app/keystore/kiyto_release.keystore -storepass "${{ secrets.KEY_STORE_PASSWORD }}" -alias "${{ secrets.KEY_ALIAS }}"

      - name: Calculate Version
        run: |
          # Wir fangen bei 2.0.1 neu an. Offset ist der aktuelle Run-Counter (ca. 104)
          # Falls der Run-Counter höher ist, wird die Patch-Version entsprechend 1, 2, 3...
          OFFSET=104
          PATCH=$(( ${{ github.run_number }} - OFFSET ))
          if [ $PATCH -lt 1 ]; then PATCH=1; fi
          
          echo "VERSION_CODE=$(( ${{ github.run_number }} + 20000 ))" >> $GITHUB_ENV
          echo "VERSION_NAME=2.0.$PATCH" >> $GITHUB_ENV

      - name: Assemble Release APK
        run: ./gradlew assembleRelease -PversionCode=${{ env.VERSION_CODE }} -PversionName=${{ env.VERSION_NAME }}
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEY_STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION_NAME }}
          name: Fokus-Kiyto v${{ env.VERSION_NAME }}
          files: app/build/outputs/apk/release/*.apk
          body: |
            Automatisch generierter Release Build.
            
            - Build Nummer: ${{ github.run_number }}
            - Status: Signierte APK
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Fokus-Kiyto-Release-APK
          path: app/build/outputs/apk/release/*.apk
          if-no-files-found: error
